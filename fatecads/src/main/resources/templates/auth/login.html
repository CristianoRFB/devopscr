<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | FatecADS</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body class="page-shell">
    <main class="page auth-page">
        <section class="auth-panel">
            <p class="eyebrow">ACESSO //</p>
            <h1>Entrar</h1>
            <p class="section-copy">Use sua conta para acessar o painel FatecADS.</p>

            <p class="alert success" th:if="${param.cadastro}">Cadastro criado. Agora e so entrar.</p>
            <p class="alert success" th:if="${param.logout}">Voce saiu do sistema.</p>
            <p class="alert error" th:if="${param.erro}">Email ou senha invalidos.</p>

            <form class="auth-form" method="post" th:action="@{/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <label class="field" for="username">
                    <span>Email</span>
                    <input type="email" id="username" name="username" autocomplete="email" required autofocus>
                </label>

                <label class="field" for="password">
                    <span>Senha</span>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </label>

                <button class="button-primary" type="submit">Entrar</button>
            </form>

            <div class="auth-footer">
                <span>Ainda nao tem conta?</span>
                <a class="button-secondary" href="/cadastro">Cadastrar</a>
            </div>
        </section>
    </main>
</body>
</html>
