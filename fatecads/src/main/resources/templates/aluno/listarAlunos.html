<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Alunos</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/pages/listar-alunos.css">
</head>
<body class="page-shell">
    <main class="page page-list">
        <section class="section-header section-header-split">
            <div>
                <p class="eyebrow">PAINEL //</p>
                <h1>Lista de Alunos</h1>
                <p class="section-copy">Visualize, edite e remova registros existentes sem alterar o fluxo do sistema.</p>
            </div>
            <a class="button-primary" href="/alunos/criar">Criar novo Aluno</a>
        </section>

        <section class="table-panel">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Endereco</th>
                        <th>CPF</th>
                        <th>RA</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="aluno : ${alunos}">
                        <td th:text="${aluno.idAluno}"></td>
                        <td th:text="${aluno.nomeAluno}"></td>
                        <td th:text="${aluno.emailAluno}"></td>
                        <td th:text="${aluno.telefoneAluno}"></td>
                        <td th:text="${aluno.enderecoAluno}"></td>
                        <td th:text="${aluno.cpfAluno}"></td>
                        <td th:text="${aluno.raAluno}"></td>
                        <td>
                            <div class="table-actions">
                                <a class="table-action" th:href="@{/alunos/editar/{id}(id=${aluno.idAluno})}">Editar</a>
                                <form method="post" th:action="@{/alunos/excluir/{id}(id=${aluno.idAluno})}" onsubmit="return confirm('Tem certeza que deseja excluir este aluno?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="table-action danger" type="submit">Excluir</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
